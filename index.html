<style>
:root{
  --bg:#080b13;--surface:#0e1320;--surface2:#141b2d;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e2e8f2;--muted:#7a8699;--dim:#3d4a5c;
  --teal:#00c896;--teal-dim:rgba(0,200,150,0.10);
  --amber:#f5a623;--red:#f06060;--green:#3dd68c;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.mono{font-family:'DM Mono',monospace}

/* ── HEADER ── */
.header{
  position:sticky;top:0;z-index:100;padding:14px 32px;
  border-bottom:1px solid var(--border);background:var(--surface);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{ display:flex; align-items:center; }
.logo h1{font-size:15px;font-weight:600;letter-spacing:-0.3px}
.logo h1 span{color:var(--muted);font-weight:400}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.conn-badge{
  display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:20px;
  font-size:11px;font-weight:500;
  background:rgba(240,96,96,0.12);color:var(--red);border:1px solid rgba(240,96,96,0.2);
}
.conn-badge.ok{background:rgba(61,214,140,0.1);color:var(--green);border-color:rgba(61,214,140,0.2)}
.conn-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.view-badge{
  display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;
  font-size:11px;font-weight:500;
  background:rgba(155,140,255,0.12);color:#9b8cff;border:1px solid rgba(155,140,255,0.2);
}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 32px}
.tab{
  padding:11px 18px;font-size:13px;font-weight:500;color:var(--muted);
  background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-1px;transition:all .15s;font-family:'Outfit',sans-serif;
}
.tab:hover{color:var(--text)}
.tab.on{color:var(--teal);border-bottom-color:var(--teal)}

/* ── CONTENT ── */
.page{padding:32px;max-width:1200px;margin:0 auto}
.pane{display:none}.pane.on{display:block}

/* ── SETUP ── */
.steps{display:grid;gap:14px}
.step{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:20px 24px;display:grid;grid-template-columns:44px 1fr;gap:16px;align-items:start;
}
.snum{
  width:36px;height:36px;border-radius:8px;background:var(--teal-dim);color:var(--teal);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;font-family:'DM Mono',monospace;flex-shrink:0;
}
.step h3{font-size:14px;font-weight:600;margin-bottom:5px}
.step p{font-size:13px;color:var(--muted);line-height:1.65;margin-top:4px}
.step a{color:var(--teal);text-decoration:none}
.step a:hover{text-decoration:underline}
.codeblock{
  margin-top:12px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;
  padding:12px 16px;font-family:'DM Mono',monospace;font-size:11.5px;
  color:#80ccb0;white-space:pre;overflow-x:auto;line-height:1.75;
}

/* ── CONFIGURE ── */
.cfg-top{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:700px){.cfg-top{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px 24px}
.card-title{font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.7px;margin-bottom:16px}
.fg{margin-bottom:14px}
.fl{font-size:11.5px;color:var(--muted);margin-bottom:5px;display:block;font-weight:500}
.fi{
  width:100%;padding:9px 13px;background:var(--bg);border:1px solid var(--border2);
  border-radius:7px;color:var(--text);font-size:13px;font-family:'DM Mono',monospace;
  outline:none;transition:border-color .15s;
}
.fi:focus{border-color:var(--teal)}
.fi::placeholder{color:var(--dim)}
.fh{font-size:11px;color:var(--dim);margin-top:4px}
.btn{
  padding:9px 18px;border-radius:7px;font-size:13px;font-weight:600;
  cursor:pointer;border:none;font-family:'Outfit',sans-serif;transition:all .15s;
}
.btn-g{background:var(--teal);color:#001a12}
.btn-g:hover{background:#00dba6}
.btn-o{background:transparent;color:var(--text);border:1px solid var(--border2)}
.btn-o:hover{border-color:var(--teal);color:var(--teal)}
.btn-red{background:transparent;color:var(--red);border:1px solid rgba(240,96,96,0.25);padding:6px 12px;font-size:12px}
.btn-red:hover{background:rgba(240,96,96,0.1)}
.btn-share{
  display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;
  font-size:13px;font-weight:600;cursor:pointer;border:1px solid rgba(155,140,255,0.3);
  background:rgba(155,140,255,0.1);color:#9b8cff;font-family:'Outfit',sans-serif;
  transition:all .15s;
}
.btn-share:hover{background:rgba(155,140,255,0.2)}
.btn-google{
  width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
  padding:11px 18px;background:var(--surface2);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);font-size:13px;font-weight:500;cursor:pointer;
  font-family:'Outfit',sans-serif;transition:all .15s;
}
.btn-google:hover{border-color:var(--teal);color:var(--teal)}
.auth-row{
  display:flex;align-items:center;gap:7px;padding:8px 12px;
  border-radius:6px;font-size:12px;font-weight:500;margin-bottom:14px;
}
.auth-row.no{background:rgba(240,96,96,0.08);color:var(--red);border:1px solid rgba(240,96,96,0.15)}
.auth-row.yes{background:rgba(61,214,140,0.08);color:var(--green);border:1px solid rgba(61,214,140,0.15)}
.ad{width:6px;height:6px;border-radius:50%;background:currentColor}

/* ── SHARE CARD ── */
.share-url-box{
  display:flex;align-items:center;gap:8px;margin-top:12px;
  background:var(--bg);border:1px solid var(--border2);border-radius:7px;padding:8px 12px;
}
.share-url-text{
  font-size:11px;font-family:'DM Mono',monospace;color:var(--teal);
  flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.divider{height:1px;background:var(--border);margin:16px 0}

/* ── SITES LIST ── */
.sites-list{display:grid;gap:12px;margin-bottom:16px}
.site-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.site-row-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;
}
.site-row-head:hover{background:var(--surface2)}
.site-row-label{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600}
.site-color-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.site-row-url{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)}
.site-row-actions{display:flex;align-items:center;gap:8px}
.chevron{font-size:11px;color:var(--dim);transition:transform .2s}
.chevron.open{transform:rotate(180deg)}
.site-row-body{padding:16px;display:none}
.site-row-body.open{display:block}
.site-fields{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
@media(max-width:800px){.site-fields{grid-template-columns:1fr 1fr}}
@media(max-width:500px){.site-fields{grid-template-columns:1fr}}
.add-site-btn{
  width:100%;padding:11px;border-radius:8px;border:1px dashed var(--border2);
  background:transparent;color:var(--muted);font-size:13px;font-weight:500;
  cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.add-site-btn:hover{border-color:var(--teal);color:var(--teal)}
.save-ok{font-size:12px;color:var(--green);display:none;margin-left:8px}
.snip-out{display:none;margin-top:14px}
.sec-title{font-size:18px;font-weight:700;margin-bottom:5px}
.sec-sub{font-size:13px;color:var(--muted);margin-bottom:24px}

/* ── DASHBOARD ── */
.dash-top{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:12px;margin-bottom:24px;
}
.dash-title{font-size:16px;font-weight:700}
.dash-sub{font-size:11px;color:var(--dim);margin-top:2px}
.rng-grp{display:flex;gap:4px}
.rng{
  padding:7px 13px;border-radius:6px;font-size:12px;font-weight:500;
  background:var(--surface);border:1px solid var(--border);color:var(--muted);
  cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s;
}
.rng.on{background:var(--teal-dim);color:var(--teal);border-color:rgba(0,200,150,.25)}
.rng:hover:not(.on){color:var(--text);border-color:var(--border2)}
.d-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px}
.site-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.site-head{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.site-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.site-n{font-size:13px;font-weight:600}
.site-u{font-size:10.5px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}
.mets{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border)}
.met{padding:12px 14px;background:var(--surface)}
.met-l{font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.met-v{font-size:17px;font-weight:600;font-family:'DM Mono',monospace}
.chart-wrap{padding:14px 16px}
.chart-leg{font-size:10px;color:var(--muted);margin-bottom:8px;display:flex;gap:12px}
.chart-leg span{display:flex;align-items:center;gap:4px}
.cmp-card{
  margin-top:18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;
}
.cmp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.cmp-title{font-size:13px;font-weight:600}
.legend{display:flex;gap:14px;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.ld{width:8px;height:8px;border-radius:50%}
.alert-box{padding:10px 15px;border-radius:7px;font-size:12px;margin-bottom:14px;line-height:1.5}
.ale-e{background:rgba(240,96,96,.1);color:var(--red);border:1px solid rgba(240,96,96,.2)}
.ale-ok{background:rgba(61,214,140,.1);color:var(--green);border:1px solid rgba(61,214,140,.2)}
.empty{display:flex;flex-direction:column;align-items:center;padding:60px 20px;color:var(--muted);text-align:center;gap:10px}
.empty h3{font-size:15px;font-weight:600;color:var(--text)}
.empty p{font-size:13px;line-height:1.6;max-width:300px}
.spin-row{display:flex;gap:8px;align-items:center;font-size:13px;color:var(--muted);margin-bottom:16px}

/* ── INSIGHT PANELS ── */
.insights-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;margin-top:18px}
.insight-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.insight-head{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.insight-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.insight-body{padding:14px 18px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-label{font-size:11px;font-family:'DM Mono',monospace;color:var(--text);width:110px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}
.bar-val{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);min-width:36px;text-align:right}
.src-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.src-row:last-child{border-bottom:none}
.src-left{display:flex;align-items:center;gap:8px}
.src-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.src-label{font-size:12px;font-family:'DM Mono',monospace;color:var(--text)}
.src-val{font-size:12px;font-family:'DM Mono',monospace;color:var(--muted)}
.ev-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.ev-row:last-child{border-bottom:none}
.ev-name{font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px}
.ev-badge{display:inline-flex;align-items:center;justify-content:center;width:8px;height:8px;border-radius:50%}
.ev-count{font-size:16px;font-weight:600;font-family:'DM Mono',monospace}
.ev-rate{font-size:10.5px;color:var(--dim);margin-top:2px}
</style>

<script>
/* ── SITE COMPARISON ── */
let cmpDays=7;

function cmpDateRange(){
  return cmpDays===0?{startDate:'today',endDate:'today'}:{startDate:`${cmpDays-1}daysAgo`,endDate:'today'};
}
function setCmpRange(d,btn){
  cmpDays=d;
  document.querySelectorAll('#p-cmp .rng').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function setCmpAlert(msg,type){
  document.getElementById('cmp-alert').innerHTML=msg?`<div class="alert-box ale-${type}" style="margin-bottom:14px">${msg}</div>`:'';
}

async function loadComparison(){
  if(!document.getElementById('p-cmp').classList.contains('on'))return;
  if(!token){setCmpAlert('Connect Google Analytics in Configure first','e');return;}
  const sites=S.sites.filter(s=>s.propId);
  if(!sites.length){setCmpAlert('No GA4 Property IDs configured','e');return;}
  setCmpAlert('','');
  document.getElementById('cmp-body').innerHTML='<div class="cmp-loading">Loading comparison…</div>';
  try{
    const results=await Promise.all(sites.map(async(site,i)=>{
      const dr=cmpDateRange();
      // Totals query (accurate users/bounce/duration)
      const [totRes,evRes]=await Promise.all([
        fetch(`https://analyticsdata.googleapis.com/v1beta/properties/${site.propId}:runReport`,{
          method:'POST',headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
          body:JSON.stringify({dateRanges:[dr],metrics:[
            {name:'sessions'},{name:'totalUsers'},{name:'screenPageViews'},
            {name:'engagementRate'},{name:'averageSessionDuration'},{name:'engagedSessions'}
          ]})
        }).then(r=>r.json()),
        fetch(`https://analyticsdata.googleapis.com/v1beta/properties/${site.propId}:runReport`,{
          method:'POST',headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
          body:JSON.stringify({dateRanges:[dr],dimensions:[{name:'eventName'}],metrics:[{name:'eventCount'}],
            dimensionFilter:{filter:{fieldName:'eventName',inListFilter:{values:['click_login','click_join','click_deposit']}}}
          })
        }).then(r=>r.json()),
      ]);
      // Parse totals
      const tm={};(totRes.metricHeaders||[]).forEach((h,idx)=>tm[h.name]=idx);
      const tv=totRes.rows?.[0]?.metricValues||[];
      const sessions=parseInt(tv[tm.sessions]?.value)||0;
      const users=parseInt(tv[tm.totalUsers]?.value)||0;
      const views=parseInt(tv[tm.screenPageViews]?.value)||0;
      const engRate=(parseFloat(tv[tm.engagementRate]?.value)||0)*100;
      const dur=parseFloat(tv[tm.averageSessionDuration]?.value)||0;
      const engSessions=parseInt(tv[tm.engagedSessions]?.value)||0;
      // Parse events
      const ev={click_login:0,click_join:0,click_deposit:0};
      (evRes.rows||[]).forEach(row=>{
        const name=row.dimensionValues[0].value;
        const cnt=parseInt(row.metricValues[0].value)||0;
        if(ev.hasOwnProperty(name))ev[name]+=cnt;
      });
      return{site,color:PALETTE[i%PALETTE.length],sessions,users,views,engRate,dur,engSessions,
        click_login:ev.click_login,click_join:ev.click_join,click_deposit:ev.click_deposit,
        login_ctr:users>0?(ev.click_login/users*100):0,
        join_ctr:users>0?(ev.click_join/users*100):0,
        deposit_ctr:users>0?(ev.click_deposit/users*100):0,
      };
    }));
    renderSiteCompTable(results);
  }catch(e){
    document.getElementById('cmp-body').innerHTML='<div class="cmp-empty">Error loading data</div>';
    setCmpAlert('Error: '+e.message,'e');
  }
}

function renderSiteCompTable(results){
  if(!results.length){document.getElementById('cmp-body').innerHTML='<div class="cmp-empty">No sites configured</div>';return;}

  const ROWS=[
    {key:'sessions',   label:'Sessions',        fmt:v=>fmt(v),        type:'num'},
    {key:'users',      label:'Users',           fmt:v=>fmt(v),        type:'num'},
    {key:'views',      label:'Page Views',      fmt:v=>fmt(v),        type:'num'},
    {key:'engRate',    label:'Engagement Rate', fmt:v=>v.toFixed(1)+'%', type:'num', color:v=>v>20?'var(--green)':v>5?'var(--amber)':'#f06060'},
    {key:'engSessions',label:'Engaged Sessions',fmt:v=>fmt(v),        type:'num'},
    {key:'dur',        label:'Avg Duration',    fmt:v=>fmtD(v),       type:'num'},
    {key:'views',      label:'Views/Session',   fmt:(v,r)=>r.sessions?(r.views/r.sessions).toFixed(1):'0', derived:true, type:'num'},
    {key:'click_login',label:'Login Clicks',    fmt:v=>fmt(v),        type:'num'},
    {key:'click_join', label:'Join Clicks',     fmt:v=>fmt(v),        type:'num'},
    {key:'click_deposit',label:'Deposit Clicks',fmt:v=>fmt(v),        type:'num'},
    {key:'login_ctr',  label:'Login CTR',       fmt:v=>v.toFixed(1)+'%', type:'num'},
    {key:'join_ctr',   label:'Join CTR',        fmt:v=>v.toFixed(1)+'%', type:'num'},
    {key:'deposit_ctr',label:'Deposit CTR',     fmt:v=>v.toFixed(1)+'%', type:'num'},
  ];

  // Header
  let html=`<div class="cmp-table-wrap"><table class="cmp-table"><thead><tr>
    <th>Metric</th>
    ${results.map(r=>`<th><span style="display:inline-flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:${r.color};display:inline-block"></span>${r.site.name}</span><div style="font-size:10px;color:var(--dim);font-weight:400;margin-top:2px">${r.site.hostname||''}</div></th>`).join('')}
  </tr></thead><tbody>`;

  ROWS.forEach(row=>{
    const vals=results.map(r=>row.derived?(r.sessions?(r.views/r.sessions):0):r[row.key]);
    const maxVal=Math.max(...vals.filter(v=>v!==null&&!isNaN(v)));
    html+=`<tr><td>${row.label}</td>`;
    results.forEach((r,i)=>{
      const v=vals[i];
      const isBest=v===maxVal&&maxVal>0;
      const dispColor=row.color?row.color(v):'';
      const style=isBest?'color:#3dd68c;font-weight:600':(dispColor?`color:${dispColor}`:'');
      const display=row.derived?row.fmt(v,r):row.fmt(v);
      html+=`<td style="${style}">${display}${isBest?' <span style="font-size:9px;opacity:.6">▲</span>':''}</td>`;
    });
    html+='</tr>';
  });

  html+=`</tbody></table></div>
  <div style="margin-top:10px;font-size:11px;color:var(--dim)">🟢 <strong style="color:#3dd68c">▲</strong> = best value per row &nbsp;·&nbsp; ${cmpDays===0?'Today':`${cmpDays}d`} window &nbsp;·&nbsp; ${results.length} sites</div>`;
  document.getElementById('cmp-body').innerHTML=html;
}

/* ── INIT ── */
window.addEventListener('DOMContentLoaded',()=>{

  load();
  initMode();
  if(!IS_SHARED){
    function tryInit(){
      if(window.google){initOAuth();if(S.wasConnected&&S.cid)tryAutoAuth();}
      else setTimeout(tryInit,500);
    }
    setTimeout(tryInit,800);
  }
});
</script>
  <!-- ── COMPARE ── -->
  <div class="pane" id="p-cmp">
    <div class="dash-top">
      <div>
        <div class="dash-title">Site Comparison</div>
        <div style="font-size:12px;color:var(--dim);margin-top:3px">Compare your landing pages side by side</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <div class="rng-grp">
          <span class="rng" onclick="setCmpRange(0,this)">1d</span>
          <span class="rng on" onclick="setCmpRange(7,this)">7d</span>
          <span class="rng" onclick="setCmpRange(14,this)">14d</span>
          <span class="rng" onclick="setCmpRange(30,this)">30d</span>
        </div>
        <button class="btn btn-g" onclick="loadComparison()" id="cmp-refresh-btn">⟳ Compare</button>
      </div>
    </div>
    <div id="cmp-alert"></div>
    <div id="cmp-body">
      <div class="cmp-empty">Click <strong>Compare</strong> to compare your landing pages</div>
    </div>
  </div>

</script>
</body>
</html>
